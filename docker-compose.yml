version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-ai-linkedin-poster
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Core n8n settings
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC

      # Security — change in production
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme

      # LinkedIn workflow configuration
      # Get your Person ID via docs/setup.md#get-your-linkedin-person-urn
      - LINKEDIN_PERSON_ID=YOUR_PERSON_ID

      # Optional: pass through AI provider keys (or configure in n8n Credentials UI)
      # - OPENAI_API_KEY=sk-...

    volumes:
      - n8n_data:/home/node/.n8n
      # Mount workflow for easy import reference (optional)
      - ./workflows:/workflows:ro

volumes:
  n8n_data: